spring.application.name=crm-backend
spring.profiles.active=${SPRING_PROFILES_ACTIVE:local}

# OPAC integration — override with OPAC_BASE_URL env var in production
opac.base-url=${OPAC_BASE_URL:http://localhost:8082}

server.port=8085

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/orque_crm}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# HikariCP connection pool
spring.datasource.hikari.maximum-pool-size=25
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1200000

# Redis cache
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.timeout=2000ms

# JWT Configuration
app.jwt.secret=${APP_JWT_SECRET}
app.jwt.access-expiration=86400000
app.jwt.refresh-expiration=604800000

# Google OAuth / Gmail
google.oauth.client-id=${GOOGLE_CLIENT_ID}
google.oauth.client-secret=${GOOGLE_CLIENT_SECRET}
google.oauth.redirect-uri=${GOOGLE_REDIRECT_URI}
google.oauth.scope=https://www.googleapis.com/auth/gmail.readonly

# Jackson Configuration
spring.jackson.deserialization.fail-on-unknown-properties=false

# License encryption
crm.license.secret=${CRM_LICENSE_SECRET}
crm.license.ivHex=${CRM_LICENSE_IV_HEX}

# CORS — comma-separated list of allowed frontend origins
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:4300}