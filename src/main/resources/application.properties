spring.application.name=crm-backend

server.port=8082

spring.datasource.url=jdbc:postgresql://localhost:5432/orque_crm
spring.datasource.username=postgres
spring.datasource.password=${DB_PASSWORD}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
# JWT Configuration
app.jwt.secret=${JWT_SECRET}
app.jwt.access-expiration=900000
app.jwt.refresh-expiration=604800000
# Google OAuth / Gmail
google.oauth.client-id=${GOOGLE_CLIENT_ID}
google.oauth.client-secret=${GOOGLE_CLIENT_SECRET}
google.oauth.redirect-uri=${GOOGLE_REDIRECT_URI}
google.oauth.scope=https://www.googleapis.com/auth/gmail.readonly